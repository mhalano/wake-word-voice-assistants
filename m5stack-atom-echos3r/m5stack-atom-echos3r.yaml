    name: Factory reset

#
# pinos mudam para o echo normal
# I2S Bus Configuration
i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO3
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO11

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: i2s_mic
    sample_rate: 16000
    i2s_din_pin: GPIO4
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: echos3r_speaker
    i2s_dout_pin: GPIO48
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac

media_player:
  - platform: speaker
    name: None
    id: echos3r_media_player
    volume_min: 0.4
    volume_max: 0.8
    announcement_pipeline:
      speaker: echos3r_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1  # Atom Echo S3R only has one output channel
    codec_support_enabled: false
    buffer_size: 6000

    files:
      - id: timer_finished_wave_file
        file: https://github.com/esphome/wake-word-voice-assistants/raw/main/sounds/timer_finished.wav

    # files:
